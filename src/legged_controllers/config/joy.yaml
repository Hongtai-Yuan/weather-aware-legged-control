teleop:
  walk:
    type: topic
    message_type: geometry_msgs/Twist
    topic_name: cmd_vel
    # deadman_buttons: [ 6 ]   # # 4 map F710 Speed commands can only be issued by pressing this button  
    axis_mappings:
      - axis: 3
        target: angular.z
        scale: 1.4
      - axis: 1
        target: linear.x
        scale: 0.5
      - axis: 0
        target: linear.y
        scale: 0.4


  load_controller:
    type: topic
    message_type: std_msgs/Float32
    topic_name: load_controller               
    deadman_buttons: [ 4 ]  # 7 map F710
    axis_mappings:
      - button: 4   # 7  map F710
        target: data
        scale: 2
        offset: 0
  
  emergency_stop:
    type: topic
    message_type: std_msgs/Float32
    topic_name: emergency_stop
    deadman_buttons: [ 7 ]
    axis_mappings:
      - button: 7
        target: data
        scale: 2
        offset: 0

  set_stance:
    type: topic
    message_type: std_msgs/Float32
    topic_name: set_stance
    deadman_buttons: [ 1 ]
    axis_mappings:
      - button: 3
        target: data
        scale: 2
        offset: 0
        
  set_trot:
    type: topic
    message_type: std_msgs/Float32
    topic_name: set_trot
    deadman_buttons: [ 2 ]
    axis_mappings:
      - button: 2
        target: data
        scale: 2
        offset: 0
  
  start_controller:
    type: topic
    message_type: std_msgs/Float32
    topic_name: start_controller
    deadman_buttons: [ 4 ]
    axis_mappings:
      - button: 2
        target: data
        scale: 2
        offset: 0


